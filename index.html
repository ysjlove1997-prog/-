<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>한글 단어 풍선 터뜨리기</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --ui-gap: 8px;
      --top-ui-width: min(96vw, 1150px);
      --ground-h: 76px;
      --play-top: 180px;
      --play-bottom: 96px;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Pretendard", sans-serif;
      background: linear-gradient(to bottom, #bfe8ff 0%, #dff6ff 45%, #fffafc 100%);
    }

    body {
      position: relative;
      touch-action: manipulation;
    }

    .game-wrap {
      position: relative;
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
    }

    .sky {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.88);
      border-radius: 999px;
      opacity: 0.9;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.88);
      border-radius: 999px;
    }

    .cloud::before {
      width: 52%;
      height: 92%;
      left: 10%;
      top: -35%;
    }

    .cloud::after {
      width: 42%;
      height: 76%;
      right: 12%;
      top: -24%;
    }

    .top-ui {
      position: absolute;
      top: calc(8px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      width: var(--top-ui-width);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--ui-gap);
      z-index: 30;
      padding: 0 2px;
    }

    .title-box {
      width: 100%;
      max-width: 760px;
      background: rgba(255,255,255,0.93);
      padding: 10px 16px;
      border-radius: 22px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    .title-box h1 {
      margin: 0 0 2px;
      font-size: clamp(20px, 3vw, 34px);
      color: #2f5d99;
      line-height: 1.2;
    }

    .title-box p {
      margin: 0;
      font-size: clamp(13px, 1.8vw, 20px);
      color: #51627d;
      line-height: 1.35;
    }

    .mode-row,
    .control-row {
      width: 100%;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 13px 20px;
      font-size: clamp(15px, 1.8vw, 21px);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, color 0.12s ease;
      min-height: 46px;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.14);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn.primary {
      background: #ff78b0;
      color: white;
    }

    .btn.secondary {
      background: white;
      color: #47618f;
    }

    .btn.mode {
      background: rgba(255,255,255,0.95);
      color: #47618f;
    }

    .btn.mode.active {
      background: #6f8cff;
      color: white;
    }

    .score-box,
    .set-label {
      background: rgba(255,255,255,0.94);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: clamp(15px, 1.6vw, 22px);
      font-weight: 900;
      color: #3d5f8f;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .balloon-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    .balloon {
      position: absolute;
      width: clamp(200px, 22vw, 320px);
      aspect-ratio: 0.82 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px 10px 26px;
      color: white;
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.06em;
      user-select: none;
      cursor: pointer;
      border-radius: 50% 50% 48% 48%;
      box-shadow:
        inset -12px -16px 24px rgba(0,0,0,0.08),
        inset 10px 12px 18px rgba(255,255,255,0.22),
        0 16px 24px rgba(0,0,0,0.14);
      animation: bob 2.8s ease-in-out infinite;
      transition: transform 0.12s ease;
      word-break: keep-all;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-wrap: nowrap;
      touch-action: manipulation;
    }

    .balloon:hover {
      transform: scale(1.04);
    }

    .balloon::before {
      content: "";
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 14px;
      background: inherit;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      filter: brightness(0.92);
    }

    .balloon::after {
      content: "";
      position: absolute;
      bottom: -42px;
      left: 50%;
      width: 3px;
      height: 48px;
      background: rgba(100,100,100,0.55);
      transform: translateX(-50%);
    }

    .balloon.popped {
      animation: pop 0.26s ease forwards;
      pointer-events: none;
    }

    .burst {
      position: absolute;
      font-size: clamp(28px, 4vw, 56px);
      font-weight: 900;
      color: #ff5b97;
      pointer-events: none;
      z-index: 40;
      animation: burstUp 0.7s ease forwards;
      text-shadow: 0 3px 8px rgba(255,255,255,0.75);
    }

    .all-clear {
      position: absolute;
      left: 50%;
      top: 54%;
      transform: translate(-50%, -50%);
      z-index: 50;
      background: rgba(255,255,255,0.96);
      padding: 24px 26px;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 16px 36px rgba(0,0,0,0.15);
      min-width: min(88vw, 460px);
      max-width: 92vw;
      display: none;
    }

    .all-clear.show {
      display: block;
      animation: panelIn 0.28s ease;
    }

    .all-clear h2 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 42px);
      color: #ff679f;
    }

    .all-clear p {
      margin: 0 0 16px;
      font-size: clamp(17px, 2.1vw, 24px);
      color: #4d5c75;
      line-height: 1.5;
    }

    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: calc(var(--ground-h) + var(--safe-bottom));
      background: linear-gradient(to top, #9be27b, #bdf1a6);
      z-index: 2;
    }

    @keyframes bob {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes pop {
      0%   { transform: scale(1); opacity: 1; }
      45%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(0.18); opacity: 0; }
    }

    @keyframes burstUp {
      0% {
        opacity: 0;
        transform: translate(-50%, 0) scale(0.7);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -8px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -45px) scale(1.08);
      }
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translate(-50%, -46%) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @media (hover: none) {
      .btn:hover,
      .balloon:hover {
        transform: none;
        box-shadow: inherit;
      }
    }

    @media (max-width: 1024px) {
      :root {
        --play-top: 190px;
      }

      .balloon {
        width: clamp(170px, 24vw, 230px);
      }
    }

    @media (max-width: 820px) {
      :root {
        --ui-gap: 7px;
        --ground-h: 68px;
        --play-top: 210px;
        --play-bottom: 88px;
      }

      .title-box {
        max-width: 92vw;
        padding: 10px 12px;
      }

      .btn {
        padding: 11px 16px;
        font-size: 15px;
        min-height: 42px;
      }

      .score-box,
      .set-label {
        padding: 10px 14px;
        font-size: 15px;
        min-height: 40px;
      }

      .balloon {
        width: clamp(132px, 30vw, 190px);
        padding: 8px 6px 18px;
      }

      .balloon::after {
        height: 40px;
        bottom: -36px;
      }
    }

    @media (max-width: 640px) {
      :root {
        --ui-gap: 6px;
        --ground-h: 62px;
        --play-top: 220px;
        --play-bottom: 82px;
      }

      .top-ui {
        width: 95vw;
      }

      .title-box {
        border-radius: 18px;
        padding: 9px 10px;
      }

      .title-box h1 {
        font-size: 22px;
      }

      .title-box p {
        font-size: 13px;
      }

      .mode-row,
      .control-row {
        gap: 7px;
      }

      .mode-row .btn {
        flex: 1 1 calc(50% - 7px);
        min-width: 0;
        padding: 10px 12px;
        font-size: 14px;
      }

      .control-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
      }

      .control-row .btn,
      .control-row .set-label,
      .control-row .score-box {
        width: 100%;
        min-width: 0;
      }

      .control-row .set-label,
      .control-row .score-box {
        font-size: 14px;
        padding: 10px 12px;
      }

      .balloon {
        width: min(37vw, 168px);
        min-width: 132px;
      }

      .all-clear {
        padding: 20px 18px;
        border-radius: 22px;
      }
    }

    @media (max-width: 420px) {
      :root {
        --play-top: 232px;
        --play-bottom: 78px;
      }

      .title-box h1 {
        font-size: 20px;
      }

      .title-box p {
        font-size: 12px;
      }

      .mode-row .btn {
        font-size: 13px;
        padding: 9px 10px;
      }

      .control-row .btn,
      .control-row .set-label,
      .control-row .score-box {
        font-size: 13px;
      }

      .balloon {
        width: min(38vw, 156px);
        min-width: 122px;
      }
    }

    @media (max-height: 740px) and (max-width: 640px) {
      :root {
        --play-top: 205px;
        --play-bottom: 72px;
        --ground-h: 54px;
      }

      .title-box {
        padding: 8px 10px;
      }

      .title-box p {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <div class="sky" id="sky"></div>

    <div class="top-ui">
      <div class="title-box">
        <h1>🎈 단어 풍선 터뜨리기</h1>
        <p>원하는 세트를 고르고 풍선을 눌러보자!</p>
      </div>

      <div class="mode-row">
        <button class="btn mode active" data-mode="basic">기본 세트</button>
        <button class="btn mode" data-mode="theme">같은 주제</button>
        <button class="btn mode" data-mode="first">첫글자</button>
        <button class="btn mode" data-mode="tricky">헷갈려요</button>
      </div>

      <div class="control-row">
        <button class="btn primary" id="newWordsBtn">새 문제</button>
        <button class="btn secondary" id="replayBtn">다시 하기</button>
        <div class="set-label" id="setLabel">기본 세트</div>
        <div class="score-box" id="scoreBox">점수 0 / 4</div>
      </div>
    </div>

    <div class="balloon-layer" id="balloonLayer"></div>

    <div class="all-clear" id="allClear">
      <h2>와아! 성공!</h2>
      <p>풍선을 모두 터뜨렸어!<br>새 문제로 또 해보자 🎉</p>
      <button class="btn primary" id="nextRoundBtn">새 문제</button>
    </div>

    <div class="ground"></div>
  </div>

  <script>
    const SETS = {
      basic: {
        label: "기본 세트",
        items: [
          ["가위", "우유", "모자", "버스"],
          ["의자", "사과", "토끼", "바지"],
          ["책상", "연필", "포도", "신발"],
          ["피아노", "딸기", "양말", "자동차"],
          ["공책", "오리", "가방", "빵"],
          ["풀", "바나나", "침대", "고양이"],
          ["지우개", "수박", "자전거", "치마"],
          ["창문", "기차", "포크", "인형"],
          ["컵", "나비", "바람", "시계"],
          ["비누", "구름", "공", "문"]
        ]
      },
      theme: {
        label: "같은 주제",
        items: [
          ["가위", "풀", "연필", "공책"],
          ["책상", "의자", "가방", "지우개"],
          ["사과", "포도", "바나나", "딸기"],
          ["우유", "빵", "밥", "수박"],
          ["모자", "바지", "양말", "신발"],
          ["토끼", "고양이", "오리", "사자"],
          ["버스", "자동차", "기차", "자전거"],
          ["피아노", "공", "인형", "블록"],
          ["컵", "포크", "숟가락", "접시"],
          ["침대", "창문", "문", "거울"]
        ]
      },
      first: {
        label: "첫글자 세트",
        items: [
          ["가위", "가방", "가게", "가을"],
          ["사과", "사자", "사람", "소파"],
          ["바지", "바나나", "바구니", "바람"],
          ["모자", "모기", "모래", "모빌"],
          ["우유", "우산", "운동화", "우체통"],
          ["자전거", "자동차", "자두", "장갑"],
          ["포도", "포크", "포장지", "포스터"],
          ["시계", "시소", "시장", "시금치"],
          ["비누", "비행기", "비둘기", "비옷"],
          ["구름", "구두", "구슬", "구멍"]
        ]
      },
      tricky: {
        label: "헷갈려요",
        items: [
          ["가위", "가방", "우유", "모자"],
          ["사과", "사자", "버스", "피아노"],
          ["바지", "바나나", "의자", "토끼"],
          ["우유", "우산", "신발", "빵"],
          ["모자", "모기", "자동차", "딸기"],
          ["비누", "비옷", "포도", "책상"],
          ["시계", "시장", "가위", "양말"],
          ["구두", "구름", "사과", "버스"],
          ["자두", "자동차", "풀", "오리"],
          ["포크", "포도", "침대", "공책"]
        ]
      }
    };

    const BALLOON_COLORS = ["#ff7aa8", "#ff9f68", "#8a7dff", "#56c6ff"];

    const balloonLayer = document.getElementById("balloonLayer");
    const scoreBox = document.getElementById("scoreBox");
    const newWordsBtn = document.getElementById("newWordsBtn");
    const replayBtn = document.getElementById("replayBtn");
    const nextRoundBtn = document.getElementById("nextRoundBtn");
    const allClear = document.getElementById("allClear");
    const sky = document.getElementById("sky");
    const setLabel = document.getElementById("setLabel");
    const modeButtons = document.querySelectorAll(".btn.mode");

    let currentMode = "basic";
    let currentWords = [];
    let currentSetIndex = -1;
    let score = 0;
    let poppedCount = 0;
    let resizeTimer = null;

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function getRandomSetIndex(mode, excludeIndex = -1) {
      const pool = SETS[mode].items;
      if (pool.length <= 1) return 0;

      let newIndex = Math.floor(Math.random() * pool.length);
      while (newIndex === excludeIndex) {
        newIndex = Math.floor(Math.random() * pool.length);
      }
      return newIndex;
    }

    function updateModeButtons() {
      modeButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === currentMode);
      });
      setLabel.textContent = SETS[currentMode].label;
    }

    function updateScore() {
      scoreBox.textContent = `점수 ${score} / ${currentWords.length}`;
    }

    function createCloud(x, y, w, h, speed) {
      const cloud = document.createElement("div");
      cloud.className = "cloud";
      cloud.style.left = x + "px";
      cloud.style.top = y + "px";
      cloud.style.width = w + "px";
      cloud.style.height = h + "px";
      sky.appendChild(cloud);

      cloud.animate(
        [
          { transform: "translateX(0px)" },
          { transform: `translateX(${speed}px)` }
        ],
        {
          duration: 28000 + Math.random() * 16000,
          iterations: Infinity,
          direction: "alternate",
          easing: "ease-in-out"
        }
      );
    }

    function buildSky() {
      sky.innerHTML = "";
      const width = window.innerWidth;
      const height = window.innerHeight;

      const cloudCount = width <= 640 ? 3 : 4;

      for (let i = 0; i < cloudCount; i++) {
        const w = 90 + Math.random() * 110;
        const h = 34 + Math.random() * 26;
        const x = Math.random() * Math.max(50, width - w);
        const y = 50 + Math.random() * (height * 0.22);
        const speed = (Math.random() * 80 + 30) * (Math.random() > 0.5 ? 1 : -1);
        createCloud(x, y, w, h, speed);
      }
    }

    function speakWord(word) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = "ko-KR";
      utterance.rate = 0.88;
      utterance.pitch = 1.0;
      window.speechSynthesis.speak(utterance);
    }

    function createBurst(x, y) {
      const burst = document.createElement("div");
      burst.className = "burst";
      burst.textContent = "팡!";
      burst.style.left = x + "px";
      burst.style.top = y + "px";
      document.body.appendChild(burst);

      setTimeout(() => {
        burst.remove();
      }, 700);
    }

    function popBalloon(balloon) {
      if (balloon.classList.contains("popped")) return;

      balloon.classList.add("popped");

      const rect = balloon.getBoundingClientRect();
      createBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);

      speakWord(balloon.dataset.word);

      score += 1;
      poppedCount += 1;
      updateScore();

      setTimeout(() => {
        balloon.remove();
        if (poppedCount === currentWords.length) {
          allClear.classList.add("show");
        }
      }, 260);
    }

    function getPlayAreaBounds() {
      const rootStyle = getComputedStyle(document.documentElement);
      const playTop = parseFloat(rootStyle.getPropertyValue("--play-top")) || 200;
      const playBottom = parseFloat(rootStyle.getPropertyValue("--play-bottom")) || 90;

      const width = window.innerWidth;
      const height = window.innerHeight;

      return {
        left: 12,
        right: width - 12,
        top: playTop,
        bottom: height - playBottom
      };
    }

    function getBalloonSizeEstimate() {
      const width = window.innerWidth;

      if (width <= 420) return { w: 122, h: 149 };
      if (width <= 640) return { w: 132, h: 160 };
      if (width <= 820) return { w: 150, h: 182 };
      if (width <= 1024) return { w: 180, h: 219 };
      return { w: 220, h: 268 };
    }

    function getBalloonPositions() {
      const w = window.innerWidth;
      const bounds = getPlayAreaBounds();
      const size = getBalloonSizeEstimate();
      const bw = size.w;
      const bh = size.h;

      const usableWidth = bounds.right - bounds.left;
      const usableHeight = bounds.bottom - bounds.top;

      if (w <= 640) {
        const x1 = bounds.left + Math.max(0, usableWidth * 0.08);
        const x2 = bounds.left + Math.max(0, usableWidth * 0.55);
        const y1 = bounds.top + Math.max(0, usableHeight * 0.03);
        const y2 = bounds.top + Math.max(0, usableHeight * 0.46);

        return [
          { x: Math.min(x1, bounds.right - bw), y: Math.min(y1, bounds.bottom - bh) },
          { x: Math.min(x2, bounds.right - bw), y: Math.min(y1 + 4, bounds.bottom - bh) },
          { x: Math.min(x1, bounds.right - bw), y: Math.min(y2, bounds.bottom - bh) },
          { x: Math.min(x2, bounds.right - bw), y: Math.min(y2 + 4, bounds.bottom - bh) }
        ];
      }

      if (w <= 980) {
        const x1 = bounds.left + usableWidth * 0.10;
        const x2 = bounds.left + usableWidth * 0.56;
        const y1 = bounds.top + usableHeight * 0.06;
        const y2 = bounds.top + usableHeight * 0.50;

        return [
          { x: Math.min(x1, bounds.right - bw), y: Math.min(y1, bounds.bottom - bh) },
          { x: Math.min(x2, bounds.right - bw), y: Math.min(y1, bounds.bottom - bh) },
          { x: Math.min(x1, bounds.right - bw), y: Math.min(y2, bounds.bottom - bh) },
          { x: Math.min(x2, bounds.right - bw), y: Math.min(y2, bounds.bottom - bh) }
        ];
      }

      const x1 = bounds.left + usableWidth * 0.05;
      const x2 = bounds.left + usableWidth * 0.36;
      const x3 = bounds.left + usableWidth * 0.67;
      const x4 = bounds.left + usableWidth * 0.34;
      const y1 = bounds.top + usableHeight * 0.08;
      const y2 = bounds.top + usableHeight * 0.04;
      const y3 = bounds.top + usableHeight * 0.12;
      const y4 = bounds.top + usableHeight * 0.52;

      return [
        { x: Math.min(x1, bounds.right - bw), y: Math.min(y1, bounds.bottom - bh) },
        { x: Math.min(x2, bounds.right - bw), y: Math.min(y2, bounds.bottom - bh) },
        { x: Math.min(x3, bounds.right - bw), y: Math.min(y3, bounds.bottom - bh) },
        { x: Math.min(x4, bounds.right - bw), y: Math.min(y4, bounds.bottom - bh) }
      ];
    }

    function getFontSizeByWord(word) {
      const width = window.innerWidth;
      const mobile = width <= 640;

      if (mobile) {
        if (word.length === 1) return "76px";
        if (word.length === 2) return "58px";
        if (word.length === 3) return "46px";
        if (word.length === 4) return "38px";
        return "31px";
      }

      if (word.length === 1) return "110px";
      if (word.length === 2) return "88px";
      if (word.length === 3) return "72px";
      if (word.length === 4) return "58px";
      return "48px";
    }

    function makeBalloon(word, index, x, y) {
      const balloon = document.createElement("div");
      balloon.className = "balloon";
      balloon.textContent = word;
      balloon.dataset.word = word;
      balloon.style.left = `${x}px`;
      balloon.style.top = `${y}px`;
      balloon.style.background = BALLOON_COLORS[index % BALLOON_COLORS.length];
      balloon.style.animationDelay = `${Math.random() * 0.8}s`;
      balloon.style.fontSize = getFontSizeByWord(word);

      balloon.addEventListener("click", () => popBalloon(balloon));
      balloon.addEventListener("touchstart", () => {}, { passive: true });

      return balloon;
    }

    function loadNewSet() {
      currentSetIndex = getRandomSetIndex(currentMode, currentSetIndex);
      currentWords = [...SETS[currentMode].items[currentSetIndex]];
    }

    function renderRound(useNewSet = true) {
      balloonLayer.innerHTML = "";
      allClear.classList.remove("show");

      score = 0;
      poppedCount = 0;

      if (useNewSet || currentWords.length === 0) {
        loadNewSet();
      }

      updateModeButtons();
      updateScore();

      const positions = getBalloonPositions();

      currentWords.forEach((word, index) => {
        const pos = positions[index];
        const balloon = makeBalloon(word, index, pos.x, pos.y);
        balloonLayer.appendChild(balloon);
      });
    }

    modeButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        currentMode = btn.dataset.mode;
        currentSetIndex = -1;
        renderRound(true);
      });
    });

    newWordsBtn.addEventListener("click", () => {
      renderRound(true);
    });

    replayBtn.addEventListener("click", () => {
      renderRound(false);
    });

    nextRoundBtn.addEventListener("click", () => {
      renderRound(true);
    });

    function handleResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        buildSky();
        renderRound(false);
      }, 120);
    }

    window.addEventListener("resize", handleResize);
    window.addEventListener("orientationchange", handleResize);

    buildSky();
    renderRound(true);
  </script>
</body>
</html>
